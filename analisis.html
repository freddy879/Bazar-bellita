<!DOCTYPE html> 
<html>
<head>
  <title>Análisis de Ventas</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      display: flex;
      background: #f4f4f4;
    }

    .sidebar {
      width: 220px;
      background: #1e272e;
      color: white;
      height: 100vh;
      padding: 20px;
    }

    .sidebar a {
      display: block;
      color: white;
      padding: 10px;
      text-decoration: none;
      margin-top: 10px;
      border-radius: 6px;
    }

    .sidebar a:hover {
      background: #485460;
    }

    .main {
      flex: 1;
    }

    .header {
      background: #ff3f34;
      color: white;
      padding: 15px;
      font-size: 20px;
    }

    .container {
      padding: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 15px;
      margin-bottom: 20px;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.1);
    }

    .big {
      font-size: 22px;
      font-weight: bold;
    }

    button {
      padding: 10px;
      border: none;
      background: #ff3f34;
      color: white;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 5px;
    }

    button:hover {
      background: #e84118;
    }

    ul {
      list-style: none;
      padding: 0;
    }

    li {
      margin: 5px 0;
    }

    input[type="date"] {
      padding: 8px;
      margin-top: 10px;
      width: 100%;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    .tag {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 5px;
      font-size: 12px;
      color: white;
    }

    .efectivo { background: green; }
    .credito { background: orange; }
  </style>
</head>

<body>

<div class="sidebar">
  <h2>FIVI</h2>
  <a href="index.html">💰 Venta</a>
  <a href="bodega.html">📦 Bodega</a>
  <a href="deuda.html">💸 Deudas</a>
  <a href="analisis.html">🔍 Historial</a>
  <a href="caja.html">💵 Caja</a>
  <a href="cliente.html">👤 Clientes</a>
</div>

<div class="main">

  <div class="header">📊 Dashboard de Empresa</div>

  <div class="container">

    <!-- DASHBOARD PRO -->
    <div class="grid">

      <div class="card">
        <h4>💰 Total General</h4>
        <div class="big" id="total">$0</div>
      </div>

      <div class="card">
        <h4>📅 Ventas Hoy</h4>
        <div class="big" id="ventasHoy">0</div>
      </div>

      <div class="card">
        <h4>💵 Ingreso Hoy</h4>
        <div class="big" id="ingresoHoy">$0</div>
      </div>

      <div class="card">
        <h4>👤 Clientes</h4>
        <div class="big" id="clientes">0</div>
      </div>

    </div>

    <div class="grid">

      <div class="card">
        <h4>💵 Efectivo</h4>
        <div class="big" id="efectivo">0</div>
      </div>

      <div class="card">
        <h4>📄 Crédito</h4>
        <div class="big" id="credito">0</div>
      </div>

    </div>

    <!-- FILTRO -->
    <div class="card">
      <h2>🔎 Buscar por fecha</h2>

      <input type="date" id="fechaFiltro">

      <button onclick="filtrarFecha()">🔍 Buscar día</button>
      <button onclick="cargar()">♻ Ver todo</button>
      <button onclick="borrarDia()">🗑 Borrar este día</button>
    </div>

    <!-- HISTORIAL -->
    <div class="card">
      <h2>📊 Historial de ventas</h2>
      <button onclick="borrarHistorial()">🗑 Borrar historial completo</button>
      <ul id="historial"></ul>
    </div>

  </div>
</div>

<script>

const API = "https://bazar-bellita.onrender.com";

// ================= CARGAR =================
async function cargar() {

  const res = await fetch(API + '/analisis');
  const data = await res.json();

  let ventas = data.ventas || [];

  document.getElementById('total').innerText =
    "$" + (data.totalGeneral || 0).toFixed(2);

  let hoy = new Date().toISOString().split("T")[0];

  let ventasHoy = ventas.filter(v =>
    new Date(v.fecha).toISOString().split("T")[0] === hoy
  );

  let totalHoy = ventasHoy.reduce((s, v) => s + (v.total || 0), 0);

  document.getElementById("ventasHoy").innerText = ventasHoy.length;
  document.getElementById("ingresoHoy").innerText = "$" + totalHoy.toFixed(2);

  let resC = await fetch(API + "/clientes");
  let dataC = await resC.json();

  document.getElementById("clientes").innerText = dataC.length || 0;

  let credito = ventas.filter(v => v.tipo === "credito").length;
  let efectivo = ventas.filter(v => v.tipo === "efectivo").length;

  document.getElementById("credito").innerText = credito;
  document.getElementById("efectivo").innerText = efectivo;

  mostrarVentas(ventas);
}

// ================= HISTORIAL =================
function mostrarVentas(ventas) {

  let ul = document.getElementById('historial');
  ul.innerHTML = "";

  let agrupado = {};

  ventas.forEach(v => {

    let fecha = new Date(v.fecha).toLocaleDateString();
    let hora = new Date(v.fecha).toLocaleTimeString();

    if (!agrupado[fecha]) agrupado[fecha] = [];
    agrupado[fecha].push({ ...v, hora });
  });

  for (let fecha in agrupado) {

    ul.innerHTML += `<h3>📅 ${fecha}</h3>`;

    agrupado[fecha].forEach(v => {

      let productosHTML = "";

      if (v.productos) {
        productosHTML = "<ul>";
        v.productos.forEach(p => {
          productosHTML += `<li>📦 ${p.nombre} x${p.cantidad}</li>`;
        });
        productosHTML += "</ul>";
      }

      ul.innerHTML += `
        <li>
          👤 <b>${v.cliente}</b><br>
          📧 ${v.correo || "Sin correo"}<br>
          📱 ${v.celular || "Sin celular"}<br>
          🆔 ${v.cedula || "Sin cédula"}<br>
          💰 $${v.total}<br>
          <span class="tag ${v.tipo}">${v.tipo}</span><br>
          🕒 ${v.hora}<br>
          ${productosHTML}
        </li>
        <hr>
      `;
    });
  }
}

// ================= FILTRO =================
async function filtrarFecha() {

  let fecha = document.getElementById("fechaFiltro").value;

  const res = await fetch(API + '/analisis');
  const data = await res.json();

  let filtradas = data.ventas.filter(v =>
    new Date(v.fecha).toISOString().split("T")[0] === fecha
  );

  mostrarVentas(filtradas);
}

// ================= BORRAR =================
async function borrarHistorial() {

  let pass = prompt("Clave:");

  if (pass !== "bellita123") return alert("Incorrecto");

  await fetch(API + "/ventas", { method: "DELETE" });

  cargar();
}

cargar();

</script>

</body>
</html>
