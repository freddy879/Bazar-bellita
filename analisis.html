<!DOCTYPE html> 
<html>
<head>
  <title>Análisis de Ventas</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      display: flex;
      background: #f4f4f4;
    }

    .sidebar {
      width: 220px;
      background: #1e272e;
      color: white;
      height: 100vh;
      padding: 20px;
    }

    .sidebar a {
      display: block;
      color: white;
      padding: 10px;
      text-decoration: none;
      margin-top: 10px;
      border-radius: 6px;
    }

    .sidebar a:hover {
      background: #485460;
    }

    .main {
      flex: 1;
    }

    .header {
      background: #ff3f34;
      color: white;
      padding: 15px;
      font-size: 20px;
    }

    .container {
      padding: 20px;
    }

    .card {
      background: white;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 10px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.1);
    }

    button {
      padding: 10px;
      border: none;
      background: #ff3f34;
      color: white;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 5px;
    }

    button:hover {
      background: #e84118;
    }

    ul {
      list-style: none;
      padding: 0;
    }

    li {
      margin: 5px 0;
    }

    input[type="date"] {
      padding: 8px;
      margin-top: 10px;
      width: 100%;
      border-radius: 6px;
      border: 1px solid #ccc;
    }
  </style>
</head>

<body>

<div class="sidebar">
  <h2>FIVI</h2>
  <a href="index.html">💰 Venta</a>
  <a href="bodega.html">📦 Bodega</a>
  <a href="deuda.html">💸 Deudas</a>
  <a href="analisis.html">🔍 Historial</a>
  <a href="caja.html">💵 Caja</a>
  <a href="cliente.html">👤 Clientes</a>
</div>

<div class="main">

  <div class="header">📊 Análisis de Ventas</div>

  <div class="container">

    <div class="card">
      <h2>Total vendido</h2>
      <h1 id="total">$0</h1>
    </div>

    <div class="card">
      <h2>🔎 Buscar por fecha</h2>

      <input type="date" id="fechaFiltro">

      <button onclick="filtrarFecha()">🔍 Buscar día</button>
      <button onclick="cargar()">♻ Ver todo</button>
      <button onclick="borrarDia()">🗑 Borrar este día</button>

    </div>

    <div class="card">
      <h2>📊 Historial de ventas</h2>
      <button onclick="borrarHistorial()">🗑 Borrar historial completo</button>
      <ul id="historial"></ul>
    </div>

  </div>

</div>

<script>

// ================= CARGAR TODO =================
async function cargar() {

  const res = await fetch('/analisis');
  const data = await res.json().catch(()=>({ ventas: [], totalGeneral: 0 }));

  document.getElementById('total').innerText =
    "$" + (data.totalGeneral || 0).toFixed(2);

  mostrarVentas(data.ventas);
}

// ================= MOSTRAR =================
function mostrarVentas(ventas) {

  let ul = document.getElementById('historial');
  ul.innerHTML = "";

  if (!ventas || ventas.length === 0) {
    ul.innerHTML = "<li>No hay ventas registradas</li>";
    return;
  }

  let agrupado = {};

  ventas.forEach(v => {

    let fechaObj = new Date(v.fecha);
    let fecha = fechaObj.toLocaleDateString();
    let hora = fechaObj.toLocaleTimeString();

    if (!agrupado[fecha]) agrupado[fecha] = [];
    agrupado[fecha].push({ ...v, hora });
  });

  for (let fecha in agrupado) {

    ul.innerHTML += `<h3>📅 ${fecha}</h3>`;

    agrupado[fecha].forEach(v => {

      let productosHTML = "";

      if (v.productos && v.productos.length > 0) {
        productosHTML = "<ul>";
        v.productos.forEach(p => {
          productosHTML += `
            <li>📦 ${p.nombre} x${p.cantidad} - $${p.precio}</li>
          `;
        });
        productosHTML += "</ul>";
      } else {
        productosHTML = "<i>Sin productos</i>";
      }

      ul.innerHTML += `
        <li style="margin-bottom:12px;">
          👤 <b>${v.cliente || "Sin nombre"}</b><br>
          💰 Total: $${v.total || 0}<br>
          🕒 Hora: ${v.hora}<br>
          ${productosHTML}
        </li>
      `;
    });
  }
}

// ================= FILTRAR POR FECHA =================
async function filtrarFecha() {

  let fecha = document.getElementById("fechaFiltro").value;

  if (!fecha) return alert("Selecciona una fecha");

  const res = await fetch('/analisis');
  const data = await res.json();

  let filtradas = data.ventas.filter(v => {
    let f = new Date(v.fecha).toISOString().split("T")[0];
    return f === fecha;
  });

  mostrarVentas(filtradas);
}

// ================= BORRAR DÍA =================
async function borrarDia() {

  let fecha = document.getElementById("fechaFiltro").value;

  if (!fecha) return alert("Selecciona una fecha");

  let pass = prompt("🔐 Contraseña:");

  if (pass !== "bellita123") {
    alert("❌ Incorrecta");
    return;
  }

  let confirmar = confirm("⚠️ ¿Borrar este día?");
  if (!confirmar) return;

  await fetch('/ventas/fecha', {
    method: 'DELETE',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ fecha })
  });

  alert("✅ Día eliminado");
  cargar();
}

// ================= BORRAR TODO =================
async function borrarHistorial() {

  let pass = prompt("🔐 Ingresa contraseña:");

  if (pass !== "bellita123") {
    alert("❌ Incorrecta");
    return;
  }

  let confirmar = confirm("⚠️ ¿Seguro que quieres borrar TODO?");
  if (!confirmar) return;

  await fetch('/ventas', {
    method: 'DELETE'
  });

  alert("✅ Historial borrado");
  cargar();
}

cargar();

</script>

</body>
</html>
