<!DOCTYPE html>
<html>
<head>
  <title>Dashboard Inteligente</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      display: flex;
      background: #f4f4f4;
    }

    .sidebar {
      width: 220px;
      background: #1e272e;
      color: white;
      height: 100vh;
      padding: 20px;
    }

    .sidebar a {
      display: block;
      color: white;
      padding: 10px;
      text-decoration: none;
      margin-top: 10px;
      border-radius: 6px;
    }

    .sidebar a:hover {
      background: #485460;
    }

    .main {
      flex: 1;
    }

    .header {
      background: #ff3f34;
      color: white;
      padding: 15px;
      font-size: 20px;
    }

    .container {
      padding: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 15px;
      margin-bottom: 20px;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.1);
    }

    .big {
      font-size: 22px;
      font-weight: bold;
    }

    button {
      padding: 10px;
      border: none;
      background: #ff3f34;
      color: white;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 5px;
    }

    button:hover {
      background: #e84118;
    }

    ul {
      list-style: none;
      padding: 0;
    }

    li {
      margin: 5px 0;
    }

    input[type="date"] {
      padding: 8px;
      margin-top: 10px;
      width: 100%;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    .tag {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 5px;
      font-size: 12px;
      color: white;
    }

    .efectivo { background: green; }
    .credito { background: orange; }
  </style>
</head>

<body>

<div class="sidebar">
  <h2>FIVI</h2>
  <a href="index.html">💰 Venta</a>
  <a href="bodega.html">📦 Bodega</a>
  <a href="deuda.html">💸 Deudas</a>
  <a href="analisis.html">🔍 Historial</a>
  <a href="caja.html">💵 Caja</a>
  <a href="cliente.html">👤 Clientes</a>
  <a href="#" class="active">📊 Dashboard</a>
</div>

<div class="main">

  <div class="header">📊 Dashboard IA Empresarial</div>

  <div class="container">

    <!-- DASHBOARD -->
    <div class="grid">
      <div class="card"><h4>💰 Total</h4><div class="big" id="total">$0</div></div>
      <div class="card"><h4>📄 Efectivo</h4><div class="big" id="efectivo">0</div></div>
      <div class="card"><h4>📄 Crédito</h4><div class="big" id="credito">0</div></div>
      <div class="card"><h4>👤 Clientes</h4><div class="big" id="clientes">0</div></div>
    </div>


    <!-- PRODUCTOS -->
    <div class="grid">
      <div class="card"><h4>🔥 Más vendido</h4><div id="top"></div></div>
      <div class="card"><h4>📉 Menos vendido</h4><div id="low"></div></div>
      <div class="card"><h4>💰 Más ganancia</h4><div id="gTop"></div></div>
      <div class="card"><h4>💸 Menos ganancia</h4><div id="gLow"></div></div>
    </div>

    <!-- GRÁFICOS -->
    <div class="card">
      <h2>📊 Ventas por día</h2>
      <canvas id="dia"></canvas>
    </div>

    <div class="card">
      <h2>📆 Ventas por mes</h2>
      <canvas id="mes"></canvas>
    </div>

    <!-- BUSCAR -->
    <div class="card">
      <h2>🔍 Buscar historial</h2>
      <input id="buscar" placeholder="Nombre / cédula / celular" oninput="buscar()">
      <button onclick="cargar()">Ver todo</button>
    </div>

    <!-- HISTORIAL -->
    <div class="card">
      <h2>📜 Historial</h2>
      <ul id="historial"></ul>
    </div>

  </div>
</div>

<script>
const API = "https://bazar-bellita.onrender.com";

let ventas = [];
let chart1, chart2;

let vistaDia = null;

function verDia(fecha) {

  vistaDia = fecha;

  let filtrado = ventas.filter(v =>
    new Date(v.fecha).toLocaleDateString("es-EC") === fecha
  );

  mostrar(filtrado);
}

function salirDia() {

  vistaDia = null;

  mostrar(ventas);
}

// ================= CARGAR =================
async function cargar() {

  const res = await fetch(API + "/analisis");
  const data = await res.json();

  ventas = data.ventas || [];

  // DASHBOARD
  document.getElementById("total").innerText =
    "$" + (data.totalGeneral || 0).toFixed(2);

  document.getElementById("efectivo").innerText =
    data.efectivo || 0;

  document.getElementById("credito").innerText =
    data.credito || 0;

  document.getElementById("clientes").innerText =
    data.clientes || 0;

  // PRODUCTOS
  document.getElementById("top").innerText =
    data.masVendidos?.[0]?.nombre || "-";

  document.getElementById("low").innerText =
    data.menosVendidos?.[0]?.nombre || "-";

  document.getElementById("gTop").innerText =
    data.masGanancia?.[0]?.nombre || "-";

  document.getElementById("gLow").innerText =
    data.menosGanancia?.[0]?.nombre || "-";

  // GRÁFICOS
  renderCharts(data);

  // HISTORIAL
  mostrar(ventas);
}

// ================= GRAFICOS =================
function renderCharts(data) {

  if (chart1) chart1.destroy();
  if (chart2) chart2.destroy();

  chart1 = new Chart(document.getElementById("dia"), {

    type: "bar",

    data: {
      labels: Object.keys(data.porDia || {}),

      datasets: [{
        label: "Ventas por día",
        data: Object.values(data.porDia || {})
      }]
    }

  });

  chart2 = new Chart(document.getElementById("mes"), {

    type: "line",

    data: {
      labels: Object.keys(data.porMes || {}),

      datasets: [{
        label: "Ventas por mes",
        data: Object.values(data.porMes || {})
      }]
    }

  });

}

// ================= HISTORIAL PRO =================
function mostrar(lista) {

  let ul = document.getElementById("historial");
  ul.innerHTML = "";

  if (!lista || lista.length === 0) {
    ul.innerHTML = "<li>No hay ventas</li>";
    return;
  }

  let agrupado = {};

  lista.forEach(v => {

    let fecha = new Date(v.fecha).toLocaleDateString("es-EC");

    if (!agrupado[fecha]) agrupado[fecha] = [];
    agrupado[fecha].push(v);

  });

  Object.keys(agrupado).forEach(fecha => {

    ul.innerHTML += `
      <div style="margin-bottom:20px;">
        
        <!-- HEADER DEL DÍA -->
        <div style="
          display:flex;
          justify-content:space-between;
          align-items:center;
          background:#eee;
          padding:10px;
          border-radius:8px;
        ">
          <b>📅 ${fecha}</b>

          <button onclick="borrarDia('${fecha}')"
            style="
              background:#e74c3c;
              color:white;
              border:none;
              padding:6px 10px;
              border-radius:6px;
              cursor:pointer;
            ">
            🗑 Borrar día
          </button>
        </div>

        <!-- BOTÓN VER SOLO DÍA -->
        <button onclick="verDia('${fecha}')"
          style="
            margin:8px 0;
            background:#3498db;
            color:white;
            border:none;
            padding:6px 10px;
            border-radius:6px;
            cursor:pointer;
          ">
          👁 Ver solo este día
        </button>
    `;

    agrupado[fecha].forEach(v => {

      let productos = "";

      if (Array.isArray(v.productos)) {

        productos = "<ul>";

        v.productos.forEach(p => {

          productos += `
            <li>
              📦 ${p.nombre} x${p.cantidad}
            </li>
          `;

        });

        productos += "</ul>";
      }

      ul.innerHTML += `
        <div style="
          background:white;
          padding:10px;
          margin-bottom:10px;
          border-radius:10px;
          box-shadow:0 2px 6px rgba(0,0,0,0.1)
        ">
          👤 <b>${v.cliente || "-"}</b><br>
          📱 ${v.celular || "-"}<br>
          🆔 ${v.cedula || "-"}<br>
          📧 ${v.correo || "-"}<br>
          💰 $${v.total || 0}<br>
          🕒 ${new Date(v.fecha).toLocaleTimeString()}<br>
          ${productos}
        </div>
      `;

    });

    ul.innerHTML += `</div>`;

  });

}

function verDia(fecha) {

  let filtrado = ventas.filter(v =>
    new Date(v.fecha).toLocaleDateString("es-EC") === fecha
  );

  mostrar(filtrado);
}

async function borrarDia(fecha) {

  if (!confirm("¿Seguro borrar todo el día " + fecha + "?")) {
    return;
  }

  try {

    // fecha viene tipo: 10/5/2026
    let partes = fecha.split("/");

    let dia = partes[0].padStart(2,"0");
    let mes = partes[1].padStart(2,"0");
    let anio = partes[2];

    let fechaISO = `${anio}-${mes}-${dia}`;

    const res = await fetch(API + "/ventas/dia", {

      method:"DELETE",

      headers:{
        "Content-Type":"application/json"
      },

      body: JSON.stringify({
        fecha: fechaISO
      })

    });

    const data = await res.json();

    alert(data.msg || "Día eliminado");

    cargar();

  } catch(err){

    console.log(err);

    alert("Error al borrar");

  }

}

// ================= BUSCAR =================
function buscar() {

  let val =
    document.getElementById("buscar")
    .value
    .toLowerCase();

  let filtrado = ventas.filter(v =>

    (v.cliente || "")
    .toLowerCase()
    .includes(val)

    ||

    (v.cedula || "")
    .includes(val)

    ||

    (v.celular || "")
    .includes(val)

  );

  mostrar(filtrado);
}

cargar();
</script>

</body>
</html>
