<!DOCTYPE html> 
<html>
<head>
  <title>Deudas - Bazar Bellita</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI';
      display: flex;
      background: #f5f6fa;
    }

    .sidebar {
      width: 220px;
      background: #1e272e;
      color: white;
      height: 100vh;
      padding: 20px;
    }

    .sidebar a {
      display: block;
      padding: 10px;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      margin-top: 10px;
    }

    .sidebar a:hover {
      background: #485460;
    }

    .main { flex: 1; }

    .header {
      background: #ff3f34;
      color: white;
      padding: 15px;
      font-size: 20px;
    }

    .contenido { padding: 20px; }

    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
      box-shadow: 0px 5px 15px rgba(0,0,0,0.1);
    }

    input {
      padding: 10px;
      margin: 5px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      padding: 10px;
      border: none;
      background: #ff3f34;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover { background: #e84118; }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #ddd;
      text-align: center;
    }
  </style>
</head>

<body>

<div class="sidebar">
  <h2>FIVI</h2>
  <a href="index.html">💰 Venta</a>
  <a href="bodega.html">📦 Bodega</a>
  <a href="deuda.html">💸 Deudas</a>
  <a href="analisis.html">🔍 Historial</a>
  <a href="caja.html">💵 Caja</a>
  <a href="cliente.html">👤 Clientes</a>
</div>

<div class="main">

  <div class="header">💸 Deudas - Bazar Bellita</div>

  <div class="contenido">

    <div class="card">
      <input id="buscar" placeholder="Buscar por nombre o cédula">
      <button onclick="buscarCliente()">Buscar</button>
      <button onclick="cargar()">♻ Recargar</button>
    </div>

    <div class="card">
      <h3>➕ Nueva Deuda</h3>

      <input id="nombre" placeholder="Nombre">
      <input id="apellido" placeholder="Apellido"><br>

      <input id="cedula" placeholder="Cédula">
      <input id="celular" placeholder="Celular">
      <input id="direccion" placeholder="Dirección"><br>

      <input id="monto" placeholder="Monto">
      <input id="meses" placeholder="Meses"><br>

      <button onclick="agregar()">Guardar</button>
    </div>

    <div class="card">
      <h3>📋 Deudas</h3>

      <table>
        <thead>
          <tr>
            <th>Cliente</th>
            <th>Cédula</th>
            <th>Celular</th>
            <th>Total</th>
            <th>Pagado</th>
            <th>Restante</th>
            <th>Estado</th>
            <th>Acción</th>
          </tr>
        </thead>

        <tbody id="tabla"></tbody>
      </table>
    </div>

  </div>

</div>

<script>

const API = location.hostname === "localhost"
  ? "http://localhost:3000"
  : "https://bazar-bellita.onrender.com";

let deudas = [];

// ================= CARGAR =================
async function cargar() {
  const res = await fetch(API + '/deudas');
  deudas = await res.json();
  mostrar(deudas);
}

// ================= MOSTRAR =================
function mostrar(lista){

  let tabla = document.getElementById("tabla");
  tabla.innerHTML = "";

  lista.forEach(d => {

    let restante = d.total - (d.pagado || 0);
    let estado = restante <= 0 ? "Pagado ✅" : "Pendiente";

    tabla.innerHTML += `
      <tr>
        <td>${d.cliente}</td>
        <td>${d.cedula}</td>
        <td>${d.celular || "-"}</td>
        <td>$${d.total}</td>
        <td>$${d.pagado || 0}</td>
        <td>$${restante}</td>
        <td>${estado}</td>
        <td>
          <input id="abono${d._id}" placeholder="Abono" style="width:80px">
          <button onclick="abonar('${d._id}')">💰</button>
          <button onclick="ver('${d._id}')">👁️</button>
          <button onclick="eliminar('${d._id}')">🗑</button>
        </td>
      </tr>
    `;
  });
}

// ================= ELIMINAR FIX =================
async function eliminar(id){

  let pass = prompt("Contraseña");

  if(pass !== "bellita123"){
    return alert("Incorrecta");
  }

  await fetch(`${API}/deudas/${id}`, {
    method: "DELETE"
  });

  cargar();
}

// ================= VER FACTURA =================
function ver(id){

  let d = deudas.find(x => x._id === id);

  let html = `
🧾 DETALLE DEUDA<br><br>

Cliente: ${d.cliente}<br><br>
Cédula: ${d.cedula}<br><br>
Celular: ${d.celular || "-"}<br><br>

📦 Productos<br>
`;

  (d.productos || []).forEach(p=>{
    html += `${p.nombre} x${p.cantidad} = $${(p.precio*p.cantidad).toFixed(2)}<br>`;
  });

  html += `<br>💰 Pagos<br>`;

  (d.pagos || []).forEach(p=>{
    html += `$${p.monto} - ${new Date(p.fecha).toLocaleString()}<br>`;
  });

  html += `
<br>Total: $${d.total}
<br>Pagado: $${d.pagado}
<br>Restante: $${d.total - d.pagado}
`;

  let w = window.open("", "", "width=400,height=600");
  w.document.write(html);
}

// ================= ABONAR FIX REAL =================
async function abonar(id){

  let input = document.getElementById(`abono${id}`);
  let monto = parseFloat(input.value);

  if(!monto) return alert("Monto inválido");

  await fetch(API + '/deudas/pagar', {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ id, monto })
  });

  await cargar(); // 🔥 IMPORTANTE

  let d = deudas.find(x => x._id === id);

  let html = `
🧾 DETALLE DEUDA<br><br>

Cliente: ${d.cliente}<br><br>
Cédula: ${d.cedula}<br><br>
Celular: ${d.celular || "-"}<br><br>

📦 Productos<br>
`;

  (d.productos || []).forEach(p=>{
    html += `${p.nombre} x${p.cantidad} = $${(p.precio*p.cantidad).toFixed(2)}<br>`;
  });

  html += `<br>💰 Pagos<br>`;

  (d.pagos || []).forEach(p=>{
    html += `$${p.monto} - ${new Date(p.fecha).toLocaleString()}<br>`;
  });

  html += `
<br>Total: $${d.total}
<br>Pagado: $${d.pagado}
<br>Restante: $${d.total - d.pagado}
`;

  let w = window.open("", "", "width=400,height=600");
  w.document.write(html);
  w.print();

  input.value = "";
}

// ================= BUSCAR =================
function buscarCliente(){

  let t = document.getElementById("buscar").value.toLowerCase();

  mostrar(deudas.filter(d =>
    (d.cliente || "").toLowerCase().includes(t) ||
    (d.cedula || "").includes(t)
  ));
}

// ================= AGREGAR =================
async function agregar(){

  let total = parseFloat(monto.value);
  if(!total) return alert("Monto inválido");

  await fetch(API + '/deudas', {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      cliente: nombre.value + " " + apellido.value,
      cedula,
      celular,
      direccion,
      total,
      productos: [],
      pagos: []
    })
  });

  cargar();
}

cargar();

</script>

</body>
</html>
