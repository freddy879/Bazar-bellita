<!DOCTYPE html> 
<html>
<head>
  <title>Deudas - Bazar Bellita</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI';
      display: flex;
      background: #f5f6fa;
    }

    .sidebar {
      width: 220px;
      background: #1e272e;
      color: white;
      height: 100vh;
      padding: 20px;
    }

    .sidebar a {
      display: block;
      padding: 10px;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      margin-top: 10px;
    }

    .sidebar a:hover {
      background: #485460;
    }

    .main { flex: 1; }

    .header {
      background: #ff3f34;
      color: white;
      padding: 15px;
      font-size: 20px;
    }

    .contenido { padding: 20px; }

    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
      box-shadow: 0px 5px 15px rgba(0,0,0,0.1);
    }

    input {
      padding: 10px;
      margin: 5px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      padding: 10px;
      border: none;
      background: #ff3f34;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover { background: #e84118; }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #ddd;
      text-align: center;
    }
  </style>
</head>

<body>

<div class="sidebar">
  <h2>FIVI</h2>
  <a href="index.html">💰 Venta</a>
  <a href="bodega.html">📦 Bodega</a>
  <a href="deuda.html">💸 Deudas</a>
  <a href="analisis.html">🔍 Historial</a>
  <a href="caja.html">💵 Caja</a>
  <a href="cliente.html">👤 Clientes</a>
</div>

<div class="main">

  <div class="header">💸 Deudas - Bazar Bellita</div>

  <div class="contenido">

    <div class="card">
      <input id="buscar" placeholder="Buscar por nombre o cédula">
      <button onclick="buscarCliente()">Buscar</button>
      <button onclick="cargar()">♻ Recargar</button>
    </div>

    <div class="card">
      <h3>➕ Nueva Deuda</h3>

      <input id="nombre" placeholder="Nombre">
      <input id="apellido" placeholder="Apellido"><br>

      <input id="cedula" placeholder="Cédula">
      <input id="celular" placeholder="Celular">
      <input id="direccion" placeholder="Dirección"><br>

      <input id="monto" placeholder="Monto">
      <input id="meses" placeholder="Meses"><br>

      <button onclick="agregar()">Guardar</button>
    </div>

    <div class="card">
      <h3>📋 Deudas</h3>

      <table>
        <thead>
          <tr>
            <th>Cliente</th>
            <th>Cédula</th>
            <th>Celular</th>
            <th>Total</th>
            <th>Pagado</th>
            <th>Restante</th>
            <th>Estado</th>
            <th>Acción</th>
          </tr>
        </thead>

        <tbody id="tabla"></tbody>
      </table>
    </div>

  </div>

</div>

<script>

const API = "https://bazar-bellita.onrender.com";


let deudas = [];

// ================= CARGAR =================
async function cargar() {
  const res = await fetch(API + '/deudas');
  deudas = await res.json();
  mostrar(deudas);
}

// ================= AGREGAR =================
async function agregar(){

  let nombreV = document.getElementById("nombre").value;
  let apellidoV = document.getElementById("apellido").value;
  let cedulaV = document.getElementById("cedula").value;
  let celularV = document.getElementById("celular").value;
  let direccionV = document.getElementById("direccion").value;
  let totalV = parseFloat(document.getElementById("monto").value);

  if(!totalV) return alert("Monto inválido");

  await fetch(API + '/deudas', {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      cliente: nombreV + " " + apellidoV,
      cedula: cedulaV || "-",
      celular: celularV || "",
      direccion: direccionV || "",
      total: totalV,
      productos: [],
      pagos: [],
      pagado: 0
    })
  });

  limpiar();
  cargar();
}

// ================= MOSTRAR =================
function mostrar(lista){

  let tabla = document.getElementById("tabla");
  tabla.innerHTML = "";

  lista.forEach(d => {

    let pagado = d.pagado || 0;
    let restante = d.total - pagado;
    let estado = restante <= 0 ? "Pagado ✅" : "Pendiente";

    let productos = (d.productos && d.productos.length)
      ? d.productos.map(p =>
          `${p.nombre} x${p.cantidad} = $${(p.precio * p.cantidad).toFixed(2)}`
        ).join("<br>")
      : "Sin productos";

    let pagos = (d.pagos && d.pagos.length)
      ? d.pagos.map(p =>
          `$${p.monto} - ${new Date(p.fecha).toLocaleString()}`
        ).join("<br>")
      : "Sin pagos";

    tabla.innerHTML += `
      <tr>
        <td>${d.cliente}</td>
        <td>${d.cedula || "-"}</td>
        <td>${d.celular || "-"}</td>
        <td>$${d.total}</td>
        <td>$${pagado}</td>
        <td>$${restante}</td>
        <td>${estado}</td>
        <td>
          <input id="abono${d._id}" style="width:80px">
          <button onclick="abonar('${d._id}')">💰</button>
          <button onclick="toggleDetalle('${d._id}')">📄</button>
          <button onclick="eliminar('${d._id}')">🗑</button>
        </td>
      </tr>

      <tr id="detalle-${d._id}" style="display:none; background:#f9f9f9;">
        <td colspan="8" style="text-align:left;">
          <b>📦 Productos:</b><br>
          ${productos}<br><br>

          <b>💰 Pagos:</b><br>
          ${pagos}
        </td>
      </tr>
    `;
  });
}

function toggleDetalle(id){
  let fila = document.getElementById("detalle-" + id);

  if(!fila) return;

  if(fila.style.display === "none"){
    fila.style.display = "table-row";
  } else {
    fila.style.display = "none";
  }
}

// ================= ABONAR =================
// ================= ABONAR =================
async function abonar(id){

  let input = document.getElementById(`abono${id}`);
  let monto = Number(input.value);

  if(!monto || monto <= 0) return alert("Monto inválido");

  try {

    const res = await fetch(API + '/deudas/pagar', {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ id, monto })
    });

    const data = await res.json();

    if(data.error) return alert(data.error);

    input.value = "";

    // 🔥 usar respuesta del backend directamente
    abrirRecibo(data, monto);

    // actualizar tabla
    cargar();

  } catch (err) {
    console.log(err);
    alert("Error al abonar la deuda");
  }
}


// ================= RECIBO =================
function abrirRecibo(d, monto){

  let win = window.open("", "", "width=300,height=600");

  let productos = (d.productos && d.productos.length)
    ? d.productos.map(p =>
        `${p.nombre} x${p.cantidad} = $${(p.precio * p.cantidad).toFixed(2)}<br>`
      ).join("")
    : "Sin productos registrados<br>";

  let pagos = (d.pagos && d.pagos.length)
    ? d.pagos.map(p =>
        `$${p.monto} - ${new Date(p.fecha).toLocaleString()}<br>`
      ).join("")
    : "Sin pagos<br>";

  let pagado = d.pagado || 0;
  let total = d.total || 0;
  let restante = d.restante ?? (total - pagado);

  win.document.write(`
  <html>
  <head>
    <style>
      body{
        font-family: monospace;
        width: 280px;
        margin:auto;
        padding:10px;
      }
      h2{text-align:center;}
      .line{border-top:1px dashed #000; margin:8px 0;}
    </style>
  </head>

  <body onload="window.print()">

    <h2>🧾 DETALLE DEUDA</h2>

    <div class="line"></div>

    Cliente: ${d.cliente || "-"}<br>
    Cédula: ${d.cedula || "-"}<br>
    Celular: ${d.celular || "-"}<br>

    <div class="line"></div>

    📦 Productos<br>
    ${productos}

    <div class="line"></div>

    💰 Pagos<br>
    ${pagos}

    <div class="line"></div>

    💵 Abono: $${monto}<br><br>

    Total: $${total}<br>
    Pagado: $${pagado}<br>
    Restante: $${restante}

  </body>
  </html>
  `);

  win.document.close();
}
// ================= VER =================
function ver(id){

  let d = deudas.find(x => x._id === id);

  let w = window.open("", "", "width=400,height=600");

  w.document.write(`
    🧾 DETALLE DEUDA<br><br>
    Cliente: ${d.cliente}<br>
    Cédula: ${d.cedula}<br>
    Celular: ${d.celular}<br><br>
    Total: $${d.total}<br>
    Pagado: $${d.pagado}<br>
    Restante: $${d.total - d.pagado}
  `);

  w.document.close();
}

// ================= LIMPIAR =================
function limpiar(){
  document.getElementById("nombre").value="";
  document.getElementById("apellido").value="";
  document.getElementById("cedula").value="";
  document.getElementById("celular").value="";
  document.getElementById("direccion").value="";
  document.getElementById("monto").value="";
}

//=================ELIMINAR================
async function eliminar(id){

  if(!confirm("¿Seguro que quieres eliminar esta deuda?")) return;

  try {

    await fetch(API + '/deudas/' + id, {
      method: "DELETE"
    });

    cargar(); // recarga la tabla

  } catch (err) {
    console.log(err);
    alert("Error al eliminar deuda");
  }
}


cargar();
</script>

</body>
</html>
