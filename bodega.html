
<!DOCTYPE html>
<html>
<head>
  <title>Bodega - Bazar Bellita</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI';
      display: flex;
      background: #f5f6fa;
    }

    .sidebar {
      width: 220px;
      background: #1e272e;
      color: white;
      height: 100vh;
      padding: 20px;
    }

    .sidebar a {
      display: block;
      color: white;
      padding: 10px;
      text-decoration: none;
      margin-top: 10px;
      border-radius: 6px;
    }

    .sidebar a:hover {
      background: #485460;
    }

    .main { flex: 1; }

    .header {
      background: #ff3f34;
      color: white;
      padding: 15px;
      font-size: 20px;
    }

    .contenido { padding: 20px; }

    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
      box-shadow: 0px 5px 15px rgba(0,0,0,0.1);
    }

    input {
      padding: 10px;
      margin: 5px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      padding: 10px;
      border: none;
      background: #ff3f34;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover { background: #e84118; }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #ddd;
      text-align: center;
    }
  </style>
</head>

<body>

<div class="sidebar">
  <h2>FIVI</h2>
  <a href="index.html">💰 Venta</a>
  <a href="bodega.html">📦 Bodega</a>
  <a href="deuda.html">💸 Deudas</a>
  <a href="analisis.html">🔍 Historial</a>
  <a href="caja.html">💵 Caja</a>
  <a href="cliente.html">👤 Clientes</a>
  <a href="o.html" class="active">📊 Dashboard</a>
</div>

<div class="main">

  <div class="header">📦 Bodega - Inventario</div>

  <div class="contenido">

    <div class="card">
      <h3>➕ Agregar Producto</h3>

      <input id="codigo" placeholder="Código de barras">
      <input id="nombre" placeholder="Nombre producto">
      <input id="precioCompra" type="number" placeholder="Precio compra">
      <input id="precioVenta" type="number" placeholder="Precio venta">
      <input id="stock" type="number" placeholder="Stock">

      <button onclick="guardar()">Guardar</button>
    </div>

    <div class="card">
      <h3>📋 Inventario</h3>
        <div style="display:flex; align-items:center; gap:8px; margin-bottom:10px;">
          <span style="font-size:18px;">🔍</span>
          <input 
           id="buscar" 
           placeholder="Buscar producto..." 
           onkeyup="filtrar()"
           style="flex:1; padding:10px; border-radius:8px; border:1px solid #ccc;"
          >
       </div>

      <table>
        <thead>
          <tr>
            <th>Código</th>
            <th>Nombre</th>
            <th>Compra</th>
            <th>Venta</th>
            <th>Stock</th>
            <th>Acciones</th>
          </tr>
        </thead>

        <tbody id="tabla"></tbody>
      </table>
    </div>

  </div>
</div>

<script>

const PASSWORD = "bellita123";

// 🔥 AUTO DETECCIÓN (LOCAL vs PRODUCCIÓN)
const API = location.hostname === "localhost"
  ? "http://localhost:3000"
  : "https://bazar-bellita.onrender.com";

let productos = [];
//=======FLTRAR======
function filtrar(){

  let t = document.getElementById("buscar")
    .value
    .toLowerCase()
    .trim();

  const filtrados = productos.filter(p =>
    (p.nombre || "").toLowerCase().includes(t) ||
    (p.codigo || "").toLowerCase().includes(t)
  );

  const tabla = document.getElementById('tabla');

  if(filtrados.length === 0){
    tabla.innerHTML = `
      <tr>
        <td colspan="6">No hay productos</td>
      </tr>
    `;
    return;
  }

  let html = "";

  filtrados.forEach(p => {

    html += `
      <tr>
        <td>${p.codigo || '-'}</td>
        <td>${p.nombre}</td>
        <td>$${p.precioCompra}</td>
        <td>$${p.precioVenta}</td>
        <td>${p.stock}</td>
        <td>
          <button onclick="editar('${p._id}')">
            ✏️ Editar
          </button>

          <button onclick="agregarStock('${p._id}')">
            ➕ Stock
          </button>

          <button onclick="eliminar('${p._id}')">
            🗑️
          </button>
        </td>
      </tr>
    `;
  });

  tabla.innerHTML = html;
}

// ================= CARGAR =================
async function cargar() {
  try{
    const res = await fetch(API + '/productos');

    if(!res.ok) throw new Error();

    productos = await res.json();

    const tabla = document.getElementById('tabla');
    tabla.innerHTML = '';

    productos.forEach(p => {
      tabla.innerHTML += `
        <tr>
          <td>${p.codigo || '-'}</td>
          <td>${p.nombre}</td>
          <td>$${p.precioCompra}</td>
          <td>$${p.precioVenta}</td>
          <td>${p.stock}</td>
          <td>
            <button onclick="editar('${p._id}')">✏️</button>
            <button onclick="agregarStock('${p._id}')">➕</button>
            <button onclick="eliminar('${p._id}')">🗑️</button>
          </td>
        </tr>
      `;
    });

  }catch(e){
    alert("❌ No conecta con el servidor");
  }
}

// ================= GUARDAR =================
async function guardar() {

  if (!nombre.value || !precioVenta.value || !stock.value) {
    return alert("Completa los datos");
  }

  await fetch(API + '/productos', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({
      codigo: codigo.value,
      nombre: nombre.value,
      precioCompra: Number(precioCompra.value),
      precioVenta: Number(precioVenta.value),
      stock: Number(stock.value)
    })
  });

  limpiar();
  cargar();
}

// ================= EDITAR =================
async function editar(id){

  let p = productos.find(x=>x._id===id);

  let codigoNuevo = prompt("Código:", p.codigo);
  let nombreNuevo = prompt("Nombre:", p.nombre);
  let compraNuevo = parseFloat(prompt("Precio compra:", p.precioCompra));
  let ventaNuevo = parseFloat(prompt("Precio venta:", p.precioVenta));

  if(!nombreNuevo) return;

  await fetch(API + `/productos/${id}`, {
    method: "PUT",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      codigo: codigoNuevo,
      nombre: nombreNuevo,
      precioCompra: compraNuevo,
      precioVenta: ventaNuevo
    })
  });

  cargar();
}

// ================= STOCK =================
async function agregarStock(id){

  let cantidad = parseInt(prompt("Agregar stock:"));

  if (!cantidad || cantidad <= 0) return;

  await fetch(API + `/productos/agregar/${id}`, {
    method: "PUT",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ cantidad })
  });

  cargar();
}

// ================= ELIMINAR =================
async function eliminar(id){

  let pass = prompt("🔐 contraseña");

  if(pass !== PASSWORD){
    alert("❌ Incorrecta");
    return;
  }

  await fetch(API + `/productos/${id}`,{
    method:'DELETE'
  });

  cargar();
}

// ================= LIMPIAR =================
function limpiar(){
  codigo.value="";
  nombre.value="";
  precioCompra.value="";
  precioVenta.value="";
  stock.value="";
}

cargar();

</script>

</body>
</html>
