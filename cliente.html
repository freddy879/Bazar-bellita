<!DOCTYPE html>
<html>
<head>
  <title>Caja - Bazar Bellita</title>

  <style>
    body { margin:0; font-family:'Segoe UI'; display:flex; background:#f5f6fa; }
    .sidebar { width:220px; background:#1e272e; color:white; height:100vh; padding:20px; }
    .sidebar a { display:block; color:white; padding:10px; text-decoration:none; margin-top:10px; border-radius:8px; }
    .sidebar a:hover { background:#485460; }
    .main { flex:1; display:flex; flex-direction:column; }
    .header { background:#ff3f34; color:white; padding:15px; font-size:20px; }
    .contenido { padding:20px; display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:20px; }
    .card { background:white; padding:20px; border-radius:12px; box-shadow:0 4px 10px rgba(0,0,0,0.08); }
    input { padding:10px; margin-top:10px; width:100%; border-radius:6px; border:1px solid #ccc; }
    button { margin-top:10px; width:100%; padding:10px; border:none; background:#ff3f34; color:white; border-radius:6px; cursor:pointer; }
    button:hover { background:#e84118; }
    .saldo { font-size:22px; color:green; font-weight:bold; }
  </style>
</head>

<body>

<div class="sidebar">
  <h2>FIVI</h2>
  <a href="index.html">💰 Venta</a>
  <a href="bodega.html">📦 Bodega</a>
  <a href="deuda.html">💸 Deudas</a>
  <a href="analisis.html">🔍 Historial</a>
  <a href="caja.html">💵 Caja</a>
  <a href="cliente.html">👤 Clientes</a>
</div>

<div class="main">
  <div class="header">🏦 Control de Caja</div>

  <div class="contenido">

    <div class="card">
      <h3>Abrir Caja</h3>
      <input id="monto" type="number">
      <button onclick="abrir()">Abrir</button>
    </div>

    <div class="card">
      <h3>Estado</h3>
      <p>Apertura: $<span id="apertura">0</span></p>
      <p>Ingresos: $<span id="ingresos">0</span></p>
      <p>Gastos: $<span id="gastos">0</span></p>
      <p class="saldo">Saldo: $<span id="saldo">0</span></p>
      <button onclick="cargar()">Actualizar</button>
    </div>

    <div class="card">
      <h3>Gasto</h3>
      <input id="gasto" type="number">
      <input id="motivo">
      <button onclick="registrarGasto()">Registrar</button>
    </div>

    <div class="card">
      <h3>Cerrar Caja</h3>
      <button onclick="cerrar()">Cerrar</button>
    </div>

  </div>
</div>

<script>

const API = window.location.origin.includes("localhost")
  ? "http://localhost:3000"
  : "https://bazar-bellita.onrender.com";

// ================= ABRIR =================
async function abrir(){
  let monto = Number(montoInput.value);
  if(!monto) return alert("Monto inválido");

  let res = await fetch(API+'/caja/abrir',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ monto })
  });

  alert("Caja abierta");
  cargar();
}

// ================= CARGAR =================
async function cargar(){
  let res = await fetch(API+'/caja');
  let data = await res.json().catch(()=>null);

  if(!data) return;

  apertura.innerText = data.apertura || 0;
  ingresos.innerText = data.ingresos || 0;
  gastos.innerText = data.gastos || 0;
  saldo.innerText = data.saldo || 0;
}

// ================= GASTO =================
async function registrarGasto(){
  let monto = Number(gasto.value);
  let motivo = document.getElementById('motivo').value;

  await fetch(API+'/caja/gasto',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ monto, motivo })
  });

  cargar();
}

// ================= CERRAR =================
async function cerrar(){
  let montoReal = prompt("Dinero real");
  let dejar = prompt("Dejar");

  await fetch(API+'/caja/cerrar',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      montoReal:Number(montoReal),
      dejar:Number(dejar||0)
    })
  });

  alert("Caja cerrada");
  cargar();
}

cargar();

</script>

</body>
</html>
